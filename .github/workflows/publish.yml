name: Publish

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  publish:
    # macOS so the Apple targets are built and tested on a native host.
    name: Publish to Maven Central (snapshot on main, release on tag)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Cache Kotlin/Native toolchain
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Check publishing credentials
      id: creds
      env:
        USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      run: |
        if [ -n "${USERNAME}" ]; then
          echo "present=true" >> "${GITHUB_OUTPUT}"
        elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "Maven Central credentials are required for tagged releases" >&2
          exit 1
        else
          echo "present=false" >> "${GITHUB_OUTPUT}"
          echo "::notice::Skipping snapshot publish; Maven Central credentials are not configured"
        fi
    - name: Determine version
      if: steps.creds.outputs.present == 'true'
      id: version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          echo "gradle_args=-Pversion=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"
        else
          echo "gradle_args=" >> "${GITHUB_OUTPUT}"
        fi
    - name: Publish
      if: steps.creds.outputs.present == 'true'
      run: ./gradlew ${{ steps.version.outputs.gradle_args }} publishToMavenCentral --no-configuration-cache
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
