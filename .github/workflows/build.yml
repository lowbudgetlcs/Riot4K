name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - target: iosSimulatorArm64Test
            os: macos-latest
          - target: macosArm64Test
            os: macos-latest
          - target: jvmTest
            os: ubuntu-latest
          - target: linuxX64Test
            os: ubuntu-latest
          - target: testAndroidHostTest
            os: ubuntu-latest
          - target: jsTest
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Cache Kotlin/Native toolchain
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Run ${{ matrix.target }}
      run: ./gradlew ${{ matrix.target }}

  checks:
    name: Lint, API compatibility, docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: detekt
      run: ./gradlew detekt
    - name: detekt (samples)
      run: ./gradlew -p samples detekt
    - name: Binary compatibility check
      run: ./gradlew apiCheck
    - name: Dokka generation check
      run: ./gradlew dokkaGenerate

  samples:
    name: Samples (jvm, java, android, js, linux)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Cache Kotlin/Native toolchain
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build and test samples
      run: >
        ./gradlew -p samples
        :mock-riot-server:build
        :jvm-sample:build
        :java-sample:build
        :android-sample:assembleDebug
        :android-sample:testDebugUnitTest
        :js-sample:build
        :js-sample:jsTest
        :linux-sample:build
        :linux-sample:linuxX64Test

  samples-ts:
    name: Samples (typescript)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Build JS distribution
      run: ./gradlew :riot4k-api:jsNodeProductionLibraryDistribution
    - name: Build mock server
      run: ./gradlew -p samples :mock-riot-server:installDist
    - name: Install, typecheck, test
      working-directory: samples/ts-sample
      run: |
        npm ci
        npm run typecheck
        npm test

  samples-apple:
    name: Samples (swift, ios framework)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Cache Kotlin/Native toolchain
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Link iOS sample framework
      run: ./gradlew -p samples :ios-sample:linkDebugFrameworkIosSimulatorArm64
    - name: Assemble Riot4K XCFramework
      run: ./gradlew :riot4k-api:assembleRiot4KSDKReleaseXCFramework
    - name: Build mock server
      run: ./gradlew -p samples :mock-riot-server:installDist
    - name: Start mock server
      run: samples/scripts/mock-server.sh start
    - name: Swift contract tests
      run: swift test --package-path samples/swift-sample
    - name: Stop mock server
      if: always()
      run: samples/scripts/mock-server.sh stop
